<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 128" width="512" height="128">
  <!-- Mole Character Sprite Sheet: 4 frames, each 128x128, transparent background -->
  <!-- Frame 0: Normal/happy (idle pose) -->
  <!-- Frame 1: Taunting (arms raised, matching reference) -->
  <!-- Frame 2: Whacked (flat squished impact) -->
  <!-- Frame 3: Dazed (recovering, X-eyes with stars) -->

  <defs>
    <radialGradient id="furGrad" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#d4a055"/>
      <stop offset="60%" stop-color="#b8863c"/>
      <stop offset="100%" stop-color="#8b6424"/>
    </radialGradient>
    <radialGradient id="bellyGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="80%" stop-color="#f0ece4"/>
      <stop offset="100%" stop-color="#e0d8cc"/>
    </radialGradient>
    <radialGradient id="cheekGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8e0d4"/>
    </radialGradient>
    <radialGradient id="noseGrad" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#555555"/>
      <stop offset="100%" stop-color="#222222"/>
    </radialGradient>
  </defs>

  <!-- ==================== FRAME 0: NORMAL/HAPPY ==================== -->
  <g transform="translate(0,0)">
    <!-- Shadow -->
    <ellipse cx="64" cy="118" rx="28" ry="5" fill="#000" opacity="0.1"/>

    <!-- Body -->
    <ellipse cx="64" cy="88" rx="26" ry="22" fill="url(#furGrad)"/>
    <!-- Belly -->
    <ellipse cx="64" cy="87" rx="19" ry="17" fill="url(#bellyGrad)"/>

    <!-- Head -->
    <ellipse cx="64" cy="55" rx="28" ry="26" fill="url(#furGrad)"/>

    <!-- Ears -->
    <ellipse cx="42" cy="37" rx="6" ry="5" fill="#b8863c"/>
    <ellipse cx="42" cy="37" rx="4" ry="3" fill="#d4a055"/>
    <ellipse cx="86" cy="37" rx="6" ry="5" fill="#b8863c"/>
    <ellipse cx="86" cy="37" rx="4" ry="3" fill="#d4a055"/>

    <!-- Cheeks -->
    <ellipse cx="49" cy="62" rx="14" ry="10" fill="url(#cheekGrad)"/>
    <ellipse cx="79" cy="62" rx="14" ry="10" fill="url(#cheekGrad)"/>

    <!-- Nose -->
    <ellipse cx="64" cy="56" rx="6" ry="5" fill="url(#noseGrad)"/>
    <ellipse cx="62" cy="54" rx="2" ry="1.5" fill="#666" opacity="0.5"/>

    <!-- Eyes (happy squint) -->
    <path d="M51,50 Q56,46 61,50" stroke="#222" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M67,50 Q72,46 77,50" stroke="#222" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Eyebrows -->
    <path d="M50,45 Q56,42 62,45" stroke="#8b6424" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M66,45 Q72,42 78,45" stroke="#8b6424" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Whiskers -->
    <line x1="35" y1="58" x2="18" y2="54" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="35" y1="62" x2="16" y2="62" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="35" y1="66" x2="18" y2="70" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="93" y1="58" x2="110" y2="54" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="93" y1="62" x2="112" y2="62" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="93" y1="66" x2="110" y2="70" stroke="#555" stroke-width="0.9" opacity="0.5"/>

    <!-- Teeth -->
    <rect x="60" y="68" width="4" height="5" rx="1" fill="white" stroke="#ddd" stroke-width="0.4"/>
    <rect x="64.5" y="68" width="4" height="5" rx="1" fill="white" stroke="#ddd" stroke-width="0.4"/>

    <!-- Paws at sides -->
    <ellipse cx="40" cy="98" rx="9" ry="6" fill="#c49a44"/>
    <ellipse cx="88" cy="98" rx="9" ry="6" fill="#c49a44"/>
  </g>

  <!-- ==================== FRAME 1: TAUNTING (arms raised) ==================== -->
  <g transform="translate(128,0)">
    <!-- Shadow -->
    <ellipse cx="64" cy="118" rx="28" ry="5" fill="#000" opacity="0.1"/>

    <!-- Body -->
    <ellipse cx="64" cy="88" rx="26" ry="22" fill="url(#furGrad)"/>
    <!-- Belly -->
    <ellipse cx="64" cy="87" rx="19" ry="17" fill="url(#bellyGrad)"/>

    <!-- Head -->
    <ellipse cx="64" cy="55" rx="28" ry="26" fill="url(#furGrad)"/>

    <!-- Ears -->
    <ellipse cx="42" cy="37" rx="6" ry="5" fill="#b8863c"/>
    <ellipse cx="42" cy="37" rx="4" ry="3" fill="#d4a055"/>
    <ellipse cx="86" cy="37" rx="6" ry="5" fill="#b8863c"/>
    <ellipse cx="86" cy="37" rx="4" ry="3" fill="#d4a055"/>

    <!-- Left arm raised -->
    <ellipse cx="30" cy="68" rx="12" ry="8" fill="#b8863c" transform="rotate(-25,30,68)"/>
    <circle cx="22" cy="58" r="7" fill="#c49a44"/>
    <!-- Claws -->
    <path d="M15,52 L12,46 L14,51" fill="#555" stroke="#444" stroke-width="0.6"/>
    <path d="M18,50 L17,43 L20,49" fill="#555" stroke="#444" stroke-width="0.6"/>
    <path d="M22,49 L22,42 L24,48" fill="#555" stroke="#444" stroke-width="0.6"/>

    <!-- Right arm raised -->
    <ellipse cx="98" cy="68" rx="12" ry="8" fill="#b8863c" transform="rotate(25,98,68)"/>
    <circle cx="106" cy="58" r="7" fill="#c49a44"/>
    <!-- Claws -->
    <path d="M113,52 L116,46 L114,51" fill="#555" stroke="#444" stroke-width="0.6"/>
    <path d="M110,50 L111,43 L108,49" fill="#555" stroke="#444" stroke-width="0.6"/>
    <path d="M106,49 L106,42 L104,48" fill="#555" stroke="#444" stroke-width="0.6"/>

    <!-- Cheeks -->
    <ellipse cx="49" cy="62" rx="14" ry="10" fill="url(#cheekGrad)"/>
    <ellipse cx="79" cy="62" rx="14" ry="10" fill="url(#cheekGrad)"/>

    <!-- Nose -->
    <ellipse cx="64" cy="56" rx="6" ry="5" fill="url(#noseGrad)"/>
    <ellipse cx="62" cy="54" rx="2" ry="1.5" fill="#666" opacity="0.5"/>

    <!-- Eyes (happy squint) -->
    <path d="M51,50 Q56,46 61,50" stroke="#222" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M67,50 Q72,46 77,50" stroke="#222" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Eyebrows (raised, cheeky) -->
    <path d="M49,43 Q56,39 63,43" stroke="#8b6424" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M65,43 Q72,39 79,43" stroke="#8b6424" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Whiskers -->
    <line x1="35" y1="58" x2="18" y2="54" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="35" y1="62" x2="16" y2="62" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="35" y1="66" x2="18" y2="70" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="93" y1="58" x2="110" y2="54" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="93" y1="62" x2="112" y2="62" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="93" y1="66" x2="110" y2="70" stroke="#555" stroke-width="0.9" opacity="0.5"/>

    <!-- Teeth -->
    <rect x="60" y="68" width="4" height="5" rx="1" fill="white" stroke="#ddd" stroke-width="0.4"/>
    <rect x="64.5" y="68" width="4" height="5" rx="1" fill="white" stroke="#ddd" stroke-width="0.4"/>

    <!-- Feet -->
    <ellipse cx="50" cy="104" rx="8" ry="5" fill="#c49a44"/>
    <ellipse cx="78" cy="104" rx="8" ry="5" fill="#c49a44"/>
  </g>

  <!-- ==================== FRAME 2: WHACKED (flat squished impact) ==================== -->
  <g transform="translate(256,0)">
    <!-- This is the moment of impact — mole is pancake-flat -->
    <!-- The body is extremely compressed vertically and stretched wide -->

    <!-- Flat squished shadow -->
    <ellipse cx="64" cy="82" rx="42" ry="6" fill="#000" opacity="0.15"/>

    <!-- Squished body — very flat ellipse -->
    <ellipse cx="64" cy="74" rx="44" ry="10" fill="url(#furGrad)"/>
    <!-- Squished belly -->
    <ellipse cx="64" cy="73" rx="32" ry="7" fill="url(#bellyGrad)"/>

    <!-- Squished head (merged into body, flat) -->
    <ellipse cx="64" cy="66" rx="38" ry="12" fill="url(#furGrad)"/>

    <!-- Ears squished out to sides -->
    <ellipse cx="26" cy="62" rx="7" ry="4" fill="#b8863c" transform="rotate(-20,26,62)"/>
    <ellipse cx="26" cy="62" rx="5" ry="2.5" fill="#d4a055" transform="rotate(-20,26,62)"/>
    <ellipse cx="102" cy="62" rx="7" ry="4" fill="#b8863c" transform="rotate(20,102,62)"/>
    <ellipse cx="102" cy="62" rx="5" ry="2.5" fill="#d4a055" transform="rotate(20,102,62)"/>

    <!-- Squished cheeks (wider) -->
    <ellipse cx="44" cy="68" rx="16" ry="7" fill="url(#cheekGrad)"/>
    <ellipse cx="84" cy="68" rx="16" ry="7" fill="url(#cheekGrad)"/>

    <!-- Flat nose -->
    <ellipse cx="64" cy="64" rx="7" ry="3" fill="url(#noseGrad)"/>

    <!-- Spiral/dazed eyes -->
    <path d="M48,60 Q50,56 54,58 Q56,62 52,63 Q48,62 49,59" stroke="#222" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M74,60 Q76,56 80,58 Q82,62 78,63 Q74,62 75,59" stroke="#222" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Whiskers splayed out flat -->
    <line x1="28" y1="65" x2="8" y2="60" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="28" y1="68" x2="6" y2="68" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="28" y1="71" x2="8" y2="76" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="100" y1="65" x2="120" y2="60" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="100" y1="68" x2="122" y2="68" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="100" y1="71" x2="120" y2="76" stroke="#555" stroke-width="0.9" opacity="0.5"/>

    <!-- Teeth poking out sideways -->
    <rect x="57" y="72" width="4" height="4" rx="1" fill="white" stroke="#ddd" stroke-width="0.3" transform="rotate(-5,59,74)"/>
    <rect x="67" y="72" width="4" height="4" rx="1" fill="white" stroke="#ddd" stroke-width="0.3" transform="rotate(5,69,74)"/>

    <!-- Paws splayed flat -->
    <ellipse cx="20" cy="76" rx="10" ry="5" fill="#c49a44" transform="rotate(-15,20,76)"/>
    <ellipse cx="108" cy="76" rx="10" ry="5" fill="#c49a44" transform="rotate(15,108,76)"/>

    <!-- Impact effect: speed lines radiating out -->
    <line x1="64" y1="50" x2="64" y2="38" stroke="#ff5722" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="44" y1="54" x2="34" y2="44" stroke="#ff5722" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="84" y1="54" x2="94" y2="44" stroke="#ff5722" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="30" y1="62" x2="16" y2="56" stroke="#ff5722" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="98" y1="62" x2="112" y2="56" stroke="#ff5722" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

    <!-- Small impact puffs -->
    <circle cx="30" cy="50" r="4" fill="#fff" opacity="0.3"/>
    <circle cx="98" cy="48" r="3" fill="#fff" opacity="0.25"/>
    <circle cx="64" cy="42" r="3.5" fill="#fff" opacity="0.2"/>
  </g>

  <!-- ==================== FRAME 3: DAZED (recovering, X-eyes with stars) ==================== -->
  <g transform="translate(384,0)">
    <!-- Shadow -->
    <ellipse cx="64" cy="118" rx="30" ry="5" fill="#000" opacity="0.1"/>

    <!-- Body (slightly squished still) -->
    <ellipse cx="64" cy="92" rx="28" ry="18" fill="url(#furGrad)"/>
    <!-- Belly -->
    <ellipse cx="64" cy="91" rx="20" ry="14" fill="url(#bellyGrad)"/>

    <!-- Head (slightly lower, recovering) -->
    <ellipse cx="64" cy="62" rx="29" ry="24" fill="url(#furGrad)"/>

    <!-- Ears (droopy) -->
    <ellipse cx="39" cy="46" rx="6" ry="5" fill="#b8863c" transform="rotate(-15,39,46)"/>
    <ellipse cx="39" cy="46" rx="4" ry="3" fill="#d4a055" transform="rotate(-15,39,46)"/>
    <ellipse cx="89" cy="46" rx="6" ry="5" fill="#b8863c" transform="rotate(15,89,46)"/>
    <ellipse cx="89" cy="46" rx="4" ry="3" fill="#d4a055" transform="rotate(15,89,46)"/>

    <!-- Arms drooping -->
    <ellipse cx="34" cy="84" rx="11" ry="7" fill="#b8863c" transform="rotate(15,34,84)"/>
    <circle cx="27" cy="90" r="6" fill="#c49a44"/>
    <ellipse cx="94" cy="84" rx="11" ry="7" fill="#b8863c" transform="rotate(-15,94,84)"/>
    <circle cx="101" cy="90" r="6" fill="#c49a44"/>

    <!-- Cheeks -->
    <ellipse cx="48" cy="68" rx="14" ry="10" fill="url(#cheekGrad)"/>
    <ellipse cx="80" cy="68" rx="14" ry="10" fill="url(#cheekGrad)"/>

    <!-- Nose -->
    <ellipse cx="64" cy="62" rx="6" ry="5" fill="url(#noseGrad)"/>
    <ellipse cx="62" cy="60" rx="2" ry="1.5" fill="#666" opacity="0.5"/>

    <!-- X Eyes (dazed) -->
    <g stroke="#222" stroke-width="2" stroke-linecap="round">
      <line x1="50" y1="54" x2="58" y2="62"/>
      <line x1="58" y1="54" x2="50" y2="62"/>
      <line x1="70" y1="54" x2="78" y2="62"/>
      <line x1="78" y1="54" x2="70" y2="62"/>
    </g>

    <!-- Droopy whiskers -->
    <line x1="34" y1="64" x2="18" y2="63" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="34" y1="68" x2="16" y2="71" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="34" y1="72" x2="18" y2="78" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="94" y1="64" x2="110" y2="63" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="94" y1="68" x2="112" y2="71" stroke="#555" stroke-width="0.9" opacity="0.5"/>
    <line x1="94" y1="72" x2="110" y2="78" stroke="#555" stroke-width="0.9" opacity="0.5"/>

    <!-- Wavy dazed mouth -->
    <path d="M55,74 Q59,78 64,74 Q69,70 73,74" stroke="#666" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Stars circling above head -->
    <polygon points="44,28 45.5,24 49,24 46.2,26.5 47.2,30 44,27.8 40.8,30 41.8,26.5 39,24 42.5,24" fill="#ffeb3b"/>
    <polygon points="64,22 65.2,19 68,19 65.8,21 66.6,24 64,22.2 61.4,24 62.2,21 60,19 62.8,19" fill="#ffeb3b" opacity="0.9"/>
    <polygon points="84,28 85.5,24 89,24 86.2,26.5 87.2,30 84,27.8 80.8,30 81.8,26.5 79,24 82.5,24" fill="#ffeb3b"/>
  </g>
</svg>
